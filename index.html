<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Тренажёр по программированию</title>
    <link rel="stylesheet" href="styles.css?v=offline-blockly-3" />
    <link rel="icon" href="data:," />
    <script src="vendor/blockly.min.js?v=offline-blockly-3"></script>
  </head>
  <body>
    <div class="app-shell">
      <main class="panel workspace-panel">
        <div class="workspace-header">
          <div>
            <h1 class="workspace-title">Конструктор программы</h1>
            <p class="workspace-subtitle">Полностью локальный режим: без CDN, API и внешних подключений.</p>
          </div>
          <div class="workspace-actions">
            <button id="reset-program" class="secondary-button" type="button">Очистить</button>
            <button id="run-program" class="run-button" type="button" aria-label="Запустить программу">
              ▶ Запуск
            </button>
          </div>
          <span class="run-hint">или Ctrl/⌘ + Enter</span>
        </div>

        <section class="program-builder" aria-label="Конструктор программы">
          <div class="builder-toolbar">
            <button class="tool-button" type="button" data-action="add-command" data-command="move-forward">Шаг вперед</button>
            <button class="tool-button" type="button" data-action="add-command" data-command="turn-left">Повернуть налево</button>
            <button class="tool-button" type="button" data-action="add-command" data-command="turn-right">Повернуть направо</button>
            <button class="tool-button repeat" type="button" data-action="add-repeat">Добавить цикл</button>
          </div>

          <div class="program-canvas">
            <div class="program-start">Запуск</div>
            <div id="program-root" class="program-list" data-list-id="root"></div>
          </div>
        </section>
      </main>

      <section class="panel level-panel">
        <div class="level-header">
          <div class="level-meta compact">
            <span id="level-progress"></span>
            <h2 id="level-title">Уровень 1</h2>
          </div>
          <select id="level-select" class="level-select" aria-label="Выбор уровня"></select>
        </div>

        <div class="board-wrapper">
          <div id="board" class="board"></div>
        </div>
      </section>
    </div>

    <div id="level-complete-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="level-complete-title">
      <div class="modal-content">
        <h3 id="level-complete-title">Молодец!</h3>
        <p id="level-complete-message"></p>
        <button id="next-level-button" class="next-level-button" type="button">Следующий уровень</button>
      </div>
    </div>
    <script src="script.js?v=offline-blockly-3"></script>
  </body>
</html>
